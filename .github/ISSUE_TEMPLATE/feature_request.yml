name: Feature Request
description: Suggest a new automation or improvement
labels: [enhancement]
body:
  - type: dropdown
    id: category
    attributes:
      label: Category
      options:
        - New automation
        - Condition change
        - New tracker support
        - Export script improvement
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What would you like?
    validations:
      required: true
  - type: textarea
    id: use-case
    attributes:
      label: Why is this needed?
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed conditions / actions
      description: If you have a JSON snippet in mind, paste it here.
      render: json
